# No-VM path: build on GitHub-hosted runners. VM + APK Forge remains the backup (see docs/BUILD.md).
name: Android build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_variant:
        description: "debug = no signing secrets; release = requires GitHub secrets (see docs/BUILD.md)"
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          # Match app compileSdk. Gradle/AGP will install build-tools if needed.
          packages: platforms;android-36

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve build variant
        id: variant
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "v=${{ github.event.inputs.build_variant }}" >> "$GITHUB_OUTPUT"
          else
            echo "v=debug" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode release keystore
        id: keystore
        if: steps.variant.outputs.v == 'release'
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::For release builds, add repository secret RELEASE_KEYSTORE_BASE64 (base64-encoded .jks / .keystore). See docs/BUILD.md."
            exit 1
          fi
          OUT="${RUNNER_TEMP}/release-signing.jks"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Assemble debug
        if: steps.variant.outputs.v != 'release'
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Assemble & bundle release (APK + AAB)
        if: steps.variant.outputs.v == 'release'
        env:
          RELEASE_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace --no-daemon

      - name: Upload debug APK
        if: steps.variant.outputs.v != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-${{ github.run_number }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload release APK and AAB
        if: steps.variant.outputs.v == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-aab-${{ github.run_number }}
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
